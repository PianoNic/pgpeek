services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgpeek:
    image: pianonic/pgpeek:latest
    # To build locally instead of pulling, comment the line above and uncomment:
    # build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/postgres}
      PGPEEK_AUTH_USER: ${PGPEEK_AUTH_USER:-}
      PGPEEK_AUTH_PASS: ${PGPEEK_AUTH_PASS:-}
      PGPEEK_READ_ONLY: ${PGPEEK_READ_ONLY:-false}
      PGPEEK_QUERY_TIMEOUT_MS: ${PGPEEK_QUERY_TIMEOUT_MS:-30000}
    ports:
      - "8081:8000"

volumes:
  pgdata:
